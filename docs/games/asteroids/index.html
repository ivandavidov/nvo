<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>Asteroids</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/normalize.css">
  <link rel="stylesheet" href="../../css/custom.css">
  <link rel="stylesheet" href="../games.css">
  <style>
    .panel{max-width:520px;margin:0 auto;text-align:center}
    canvas{width:100%;max-width:400px;display:block;margin:0 auto;border:1px solid #333;background:#111}
    .meta{display:flex;justify-content:space-between;margin-bottom:8px;color:#555}
  </style>
  <script src="../games-header.js" defer></script>
  <script src="../games-touch.js" defer></script>
</head>
<body class="games-theme">
  <div class="container">
  <div class="row" style="margin-top:2rem"><a href="../">&larr; Към игрите</a></div>
  <div class="row panel">
  <h4>Asteroids</h4>
  <div class="meta"><span>Точки: <strong id="score">0</strong></span><span>Живот: <strong id="lives">3</strong></span></div>
  <canvas id="c" width="400" height="400"></canvas>
  <div style="margin-top:6px;color:#666;font-size:.9em">← → завъртане, ↑ газ, Space стрелба</div>
  <button class="button" style="margin-top:8px" id="restart">Нова игра</button>
  </div>
  </div>
<script>
'use strict';
const cv=document.getElementById('c'),ctx=cv.getContext('2d'),W=400,H=400;
let ship,asteroids,bullets,score,lives,over,keys={};

function init(){
  ship={x:W/2,y:H/2,angle:0,vx:0,vy:0};asteroids=[];bullets=[];score=0;lives=3;over=false;
  document.getElementById('score').textContent='0';document.getElementById('lives').textContent='3';
  for(let i=0;i<5;i++)spawnAsteroid(3);loop()
}

function spawnAsteroid(size,x,y){
  if(x===undefined){x=Math.random()*W;y=Math.random()<0.5?0:H}
  const speed=1+Math.random()*1.5;const angle=Math.random()*Math.PI*2;
  asteroids.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,size,radius:size*12})
}

function wrap(o){if(o.x<-20)o.x=W+20;if(o.x>W+20)o.x=-20;if(o.y<-20)o.y=H+20;if(o.y>H+20)o.y=-20}

function loop(){
  if(over)return;update();draw();requestAnimationFrame(loop)
}

function update(){
  if(keys.left)ship.angle-=0.07;
  if(keys.right)ship.angle+=0.07;
  if(keys.up){ship.vx+=Math.cos(ship.angle)*0.15;ship.vy+=Math.sin(ship.angle)*0.15}
  ship.vx*=0.99;ship.vy*=0.99;ship.x+=ship.vx;ship.y+=ship.vy;wrap(ship);
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;b.life--});
  bullets=bullets.filter(b=>b.life>0&&b.x>-10&&b.x<W+10&&b.y>-10&&b.y<H+10);
  asteroids.forEach(a=>{a.x+=a.vx;a.y+=a.vy;wrap(a)});
  // bullet-asteroid collision
  bullets.forEach(b=>{
    asteroids.forEach(a=>{
      if(a.dead)return;
      const dx=b.x-a.x,dy=b.y-a.y;
      if(dx*dx+dy*dy<a.radius*a.radius){a.dead=true;b.life=0;score+=a.size===3?20:a.size===2?50:100;
        document.getElementById('score').textContent=score;
        if(a.size>1){spawnAsteroid(a.size-1,a.x,a.y);spawnAsteroid(a.size-1,a.x,a.y)}
      }
    })
  });
  asteroids=asteroids.filter(a=>!a.dead);
  // ship-asteroid collision
  asteroids.forEach(a=>{
    const dx=ship.x-a.x,dy=ship.y-a.y;
    if(dx*dx+dy*dy<(a.radius+8)*(a.radius+8)){
      lives--;document.getElementById('lives').textContent=lives;
      ship.x=W/2;ship.y=H/2;ship.vx=0;ship.vy=0;
      if(lives<=0){over=true;drawGameOver()}
    }
  });
  if(!asteroids.length){for(let i=0;i<5+Math.floor(score/200);i++)spawnAsteroid(3)}
}

function draw(){
  ctx.fillStyle='#111';ctx.fillRect(0,0,W,H);
  // ship
  ctx.save();ctx.translate(ship.x,ship.y);ctx.rotate(ship.angle);
  ctx.strokeStyle='#0f0';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(12,0);ctx.lineTo(-8,-7);ctx.lineTo(-8,7);ctx.closePath();ctx.stroke();
  ctx.restore();
  // asteroids
  ctx.strokeStyle='#aaa';ctx.lineWidth=1.5;
  asteroids.forEach(a=>{ctx.beginPath();ctx.arc(a.x,a.y,a.radius,0,Math.PI*2);ctx.stroke()});
  // bullets
  ctx.fillStyle='#ff0';bullets.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,2,0,Math.PI*2);ctx.fill()})
}

function drawGameOver(){
  draw();ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
  ctx.fillText('Край! '+score+' точки',W/2,190);ctx.font='16px sans-serif';ctx.fillText('Натисни "Нова игра"',W/2,220)
}

function fire(){
  if(over)return;
  bullets.push({x:ship.x+Math.cos(ship.angle)*14,y:ship.y+Math.sin(ship.angle)*14,vx:Math.cos(ship.angle)*7,vy:Math.sin(ship.angle)*7,life:50})
}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft')keys.left=true;if(e.key==='ArrowRight')keys.right=true;
  if(e.key==='ArrowUp'){keys.up=true;e.preventDefault()}if(e.code==='Space'){fire();e.preventDefault()}
});
document.addEventListener('keyup',e=>{if(e.key==='ArrowLeft')keys.left=false;if(e.key==='ArrowRight')keys.right=false;if(e.key==='ArrowUp')keys.up=false});
document.getElementById('restart').onclick=init;
init();
</script>
</body>
</html>
