<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>Memory</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/normalize.css">
  <link rel="stylesheet" href="../../css/custom.css">
  <link rel="stylesheet" href="../games.css">
  <style>
    .wrap { max-width: 640px; margin: 0 auto; }
    .bar { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; color:var(--color-text-muted); }
    .size-btns { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:8px; }
    .board { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
    .card {
      aspect-ratio: 4/5;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background:var(--color-surface);
      color:var(--color-text);
      font-size: clamp(2.5rem, 12vw, 4.5rem);
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      user-select:none;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .card.open, .card.matched { background:var(--color-bg-alt); }
    .card.matched { border-color:var(--color-success); }
  </style>
  <script>
    (function() {
      var saved = localStorage.getItem('nvo-theme');
      if (!saved && window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        saved = 'dark';
      }
      if (saved === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <script src="../games-header.js" defer></script>
  <script src="../games-touch.js" defer></script>
</head>
<body class="games-theme">
  <div class="container">
  <div class="row" style="margin-top:2rem"><a href="../">← Към игрите</a></div>
  <div class="row wrap">
  <h4>Memory</h4>
  <div class="bar">
    <span>Ходове: <strong id="moves">0</strong></span>
    <button id="reset" class="button">Нова игра</button>
  </div>
  <div class="size-btns">
    <button id="sz-4x3" class="button">4×3</button>
    <button id="sz-4x4" class="button button-primary">4×4</button>
    <button id="sz-4x5" class="button">4×5</button>
    <button id="sz-4x6" class="button">4×6</button>
  </div>
  <div id="board" class="board"></div>
  </div>
  </div>
  <script>
  'use strict';
  const ICONS = ['🍎','🍌','🍇','🍒','🍉','🍍','🥝','🍓','🍑','🍋','🍐','🍊'];
  const boardEl = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  let cards = [], open = [], lock = false, moves = 0, matched = 0;
  let rows = 4; // default 4x4

  function setSize(r) {
    rows = r;
    ['4x3','4x4','4x5','4x6'].forEach(s => {
      document.getElementById('sz-' + s).classList.remove('button-primary');
    });
    document.getElementById('sz-4x' + r).classList.add('button-primary');
    init();
  }

  function shuffle(arr){
    for(let i=arr.length-1;i>0;i--){
      const j = (Math.random()*(i+1))|0;
      [arr[i],arr[j]] = [arr[j],arr[i]];
    }
    return arr;
  }

  function init(){
    const pairs = (4 * rows) / 2;
    const icons = ICONS.slice(0, pairs);
    const pool = shuffle(icons.concat(icons));
    cards = pool.map((v,i)=>({id:i,v,open:false,matched:false}));
    open = []; lock = false; moves = 0; matched = 0;
    movesEl.textContent = '0';
    render();
  }

  function clickCard(i){
    const c = cards[i];
    if(lock || c.open || c.matched) return;
    c.open = true;
    open.push(i);
    render();
    if(open.length < 2) return;
    moves++; movesEl.textContent = String(moves);
    const [a,b] = open;
    if(cards[a].v === cards[b].v){
      cards[a].matched = cards[b].matched = true;
      matched += 2;
      open = [];
      if(matched === cards.length) setTimeout(()=>alert('Победа! Ходове: ' + moves), 40);
      render();
      return;
    }
    lock = true;
    setTimeout(()=>{
      cards[a].open = cards[b].open = false;
      open = [];
      lock = false;
      render();
    }, 650);
  }

  function render(){
    boardEl.innerHTML = '';
    cards.forEach((c,i)=>{
      const b = document.createElement('button');
      b.className = 'card' + (c.open?' open':'') + (c.matched?' matched':'');
      b.textContent = c.open || c.matched ? c.v : '•';
      b.style.color = c.open || c.matched ? 'var(--color-text)' : 'var(--color-text-light)';
      b.onclick = ()=>clickCard(i);
      boardEl.appendChild(b);
    });
  }

  document.getElementById('sz-4x3').onclick = ()=>setSize(3);
  document.getElementById('sz-4x4').onclick = ()=>setSize(4);
  document.getElementById('sz-4x5').onclick = ()=>setSize(5);
  document.getElementById('sz-4x6').onclick = ()=>setSize(6);
  document.getElementById('reset').onclick = init;
  init();
  </script>
</body>
</html>
