<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8">
  <title>Lights Out</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../css/fonts.css">
  <link rel="stylesheet" href="../../css/normalize.css">
  <link rel="stylesheet" href="../../css/skeleton.css">
  <link rel="stylesheet" href="../../css/custom.css">
  <style>
    .panel{max-width:520px;margin:0 auto;text-align:center}
    .board{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:16px auto;max-width:300px}
    .cell{aspect-ratio:1;border:2px solid #555;border-radius:8px;cursor:pointer;transition:background .15s,box-shadow .15s;background:#333;box-shadow:inset 0 0 6px rgba(0,0,0,.4)}
    .cell.on{background:#f5c518;border-color:#d4a800;box-shadow:0 0 14px rgba(245,197,24,.6),inset 0 0 8px rgba(255,255,255,.3)}
    .meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    #msg{font-size:1.1rem;font-weight:bold;min-height:2rem;margin-bottom:8px;color:#2b8a3e}
  </style>
</head>
<body>
  <div class="container">
    <div class="row" style="margin-top:2rem"><a href="../">&larr; Към игрите</a></div>
    <div class="row panel">
      <h4>Lights Out</h4>
      <div id="msg"></div>
      <div class="meta"><span>Ходове: <strong id="moves">0</strong></span><button class="button" id="newGame">Нова игра</button></div>
      <div id="board" class="board"></div>
    </div>
  </div>
<script>
'use strict';
const S=5;let grid,moves,over;
function init(){grid=Array.from({length:S},()=>Array(S).fill(false));moves=0;over=false;document.getElementById('moves').textContent='0';document.getElementById('msg').textContent='';genPuzzle();render()}
function genPuzzle(){grid=Array.from({length:S},()=>Array(S).fill(false));const n=8+Math.floor(Math.random()*10);for(let i=0;i<n;i++){toggle(Math.floor(Math.random()*S),Math.floor(Math.random()*S))}if(grid.every(r=>r.every(v=>!v)))genPuzzle()}
function toggle(r,c){[[0,0],[-1,0],[1,0],[0,-1],[0,1]].forEach(([dr,dc])=>{const nr=r+dr,nc=c+dc;if(nr>=0&&nr<S&&nc>=0&&nc<S)grid[nr][nc]=!grid[nr][nc]})}
function render(){const b=document.getElementById('board');b.innerHTML='';for(let r=0;r<S;r++)for(let c=0;c<S;c++){const d=document.createElement('button');d.className='cell'+(grid[r][c]?' on':'');d.onclick=()=>click(r,c);b.appendChild(d)}}
function click(r,c){if(over)return;toggle(r,c);moves++;document.getElementById('moves').textContent=moves;render();if(grid.every(r=>r.every(v=>!v))){over=true;document.getElementById('msg').textContent='Браво! Успя за '+moves+' хода!'}}
document.getElementById('newGame').onclick=init;
init();
</script>
</body>
</html>
